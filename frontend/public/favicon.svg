<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Glassy dark background -->
  <rect width="512" height="512" rx="120" fill="#0f111a" />
  
  <!-- Left leg of V -->
  <polygon points="120,150 190,150 290,380 220,380" fill="url(#grad-blue)" filter="url(#shadow)" />
  
  <!-- Right leg of V -->
  <polygon points="392,150 322,150 222,380 292,380" fill="url(#grad-cyan)" filter="url(#shadow)" />

  <!-- The Shift arrow slicing through -->
  <polygon points="230,235 340,235 370,265 340,295 230,295 260,265" fill="#e2e8f0" opacity="0.95" filter="url(#shadow)" />
</svg>
