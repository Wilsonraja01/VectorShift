# fly.toml app configuration file generated for Fly.io
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "vector-shift-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/vector_db.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "sqlite_data"
  destination = "/data"
